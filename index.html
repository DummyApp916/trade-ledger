// Multi-CDN fallback loader
(function(){
  var cdns = [
    {
      react:    'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js',
      reactdom: 'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js',
      babel:    'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js'
    },
    {
      react:    'https://unpkg.com/react@18.2.0/umd/react.production.min.js',
      reactdom: 'https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js',
      babel:    'https://unpkg.com/@babel/standalone@7.23.2/babel.min.js'
    },
    {
      react:    'https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js',
      reactdom: 'https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js',
      babel:    'https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.2/babel.min.js'
    }
  ];
  function loadScript(url, cb) {
    var s = document.createElement('script');
    s.src = url;
    s.onload = function(){ cb(null); };
    s.onerror = function(){ cb(new Error('failed')); };
    document.head.appendChild(s);
  }
  function tryLoad(idx) {
    if(idx >= cdns.length) {
      document.body.innerHTML = '<div style="font-family:sans-serif;padding:40px;background:#111;color:#ff6b6b;min-height:100vh"><h2>⚠️ No Internet Connection</h2><p style="margin-top:16px;color:#ccc">This app needs internet to load once. Please connect to WiFi or mobile data and refresh the page.</p><br><button onclick="location.reload()" style="background:#f5c842;color:#000;border:none;padding:12px 24px;border-radius:8px;font-size:16px;cursor:pointer">🔄 Retry</button></div>';
      return;
    }
    var c = cdns[idx];
    loadScript(c.react, function(e1){
      if(e1){ tryLoad(idx+1); return; }
      loadScript(c.reactdom, function(e2){
        if(e2){ tryLoad(idx+1); return; }
        loadScript(c.babel, function(e3){
          if(e3){ tryLoad(idx+1); return; }
          // All 3 loaded! Now transform and run the app
          var appScript = document.getElementById('app-source');
          if(appScript) Babel.transform && eval(Babel.transform(appScript.textContent, {presets:['react']}).code);
        });
      });
    });
  }
  tryLoad(0);
})();
</script>

const {useState, useMemo, useEffect, useCallback} = React;

/* ─── CONSTANTS ─── */
const GOLD='#f5c842', GREEN='#3ddc84', RED='#ff6b6b';

/* ─── HELPERS ─── */
const fmtINR = n => Number(n||0).toLocaleString('en-IN');
const fmtDate = d => new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
const todayISO = () => new Date().toISOString().split('T')[0];
const sumW = arr => arr.reduce((s,e) => s + +e.weight, 0);
const sumA = arr => arr.reduce((s,e) => s + +e.amount, 0);
const avgR = arr => sumW(arr) ? Math.round(sumA(arr)/sumW(arr)) : 0;
const lsSave = (k,v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} };
const lsLoad = (k,fb) => { try { const d=localStorage.getItem(k); return d?JSON.parse(d):fb; } catch(e){ return fb; } };

const IS = {
  width:'100%', background:'rgba(255,255,255,.06)',
  border:'1px solid rgba(255,255,255,.11)', borderRadius:10,
  padding:'12px 14px', color:'#fff', fontSize:15, fontFamily:'inherit', outline:'none'
};

/* ─── ENCRYPTION ─── */
const enc_ = new TextEncoder(), dec_ = new TextDecoder();
function bytesToHex(buf){ return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join(''); }
function hexToBytes(hex){ const b=new Uint8Array(hex.length/2); for(let i=0;i<b.length;i++) b[i]=parseInt(hex.substr(i*2,2),16); return b; }
async function deriveKey(pw, saltHex){
  const km = await crypto.subtle.importKey('raw',enc_.encode(pw),{name:'PBKDF2'},false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:hexToBytes(saltHex),iterations:200000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function encryptData(pw, saltHex, data){
  const key = await deriveKey(pw, saltHex);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:'AES-GCM',iv}, key, enc_.encode(JSON.stringify(data)));
  return bytesToHex(iv)+':'+bytesToHex(ct);
}
async function decryptData(pw, saltHex, payload){
  const [ivHex,ctHex] = payload.split(':');
  const key = await deriveKey(pw, saltHex);
  const pt = await crypto.subtle.decrypt({name:'AES-GCM',iv:hexToBytes(ivHex)}, key, hexToBytes(ctHex));
  return JSON.parse(dec_.decode(pt));
}

/* ─── CLOUD ─── */
async function cloudPush(pantryId, pw, salt, entries){
  const cipher = await encryptData(pw, salt, {entries, ts:Date.now()});
  const r = await fetch(`${PANTRY_BASE}/${pantryId}/basket/${BASKET}`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({cipher, createdAt:Date.now(), v:1})
  });
  if(!r.ok) throw new Error('HTTP '+r.status);
}
async function cloudPull(pantryId, pw, salt){
  const r = await fetch(`${PANTRY_BASE}/${pantryId}/basket/${BASKET}`);
  if(r.status===400||r.status===404) throw new Error('NOBASKET');
  if(!r.ok) throw new Error('HTTP '+r.status);
  const p = await r.json();
  if(p.createdAt && Date.now()-p.createdAt > 7*24*60*60*1000) throw new Error('EXPIRED');
  return decryptData(pw, salt, p.cipher);
}
async function cloudDeleteBasket(pantryId){
  const r = await fetch(`${PANTRY_BASE}/${pantryId}/basket/${BASKET}`, {method:'DELETE'});
  if(!r.ok && r.status!==404 && r.status!==400) throw new Error('HTTP '+r.status);
}

/* ─── SYNC MODAL (for advanced/reset use) ─── */

/* ─── EDIT MODAL ─── */
function EditModal({entry, onSave, onClose}){
  const [f, setF] = useState({...entry, weight:String(entry.weight), rate:String(entry.rate), amount:String(entry.amount)});
  const [err, setErr] = useState('');

  const calcOnBlur = field => () => {
    setF(prev => {
      const w=prev.weight, r=prev.rate, a=prev.amount;
      if(field==='weight'){ if(w&&r) return {...prev,amount:String(Math.round(+w*+r))}; if(w&&a) return {...prev,rate:String((+a/+w).toFixed(2))}; }
      if(field==='rate'){   if(r&&w) return {...prev,amount:String(Math.round(+w*+r))}; if(r&&a) return {...prev,weight:String((+a/+r).toFixed(2))}; }
      if(field==='amount'){ if(a&&w) return {...prev,rate:String((+a/+w).toFixed(2))};  if(a&&r) return {...prev,weight:String((+a/+r).toFixed(2))}; }
      return prev;
    });
  };

  const handle = () => {
    const filled = [f.weight, f.rate, f.amount].filter(v=>v&&+v>0).length;
    if(!f.partyName||filled<2){ setErr('Fill Party Name + any 2 of Weight/Rate/Amount'); return; }
    if(!f.date){ setErr('Pick a date'); return; }
    onSave({...f, weight:+f.weight||0, rate:+f.rate||0, amount:+f.amount||Math.round(+f.weight*+f.rate)});
  };

  const isB = f.type==='bought';
  return (
    <div className="modal-bg" onClick={onClose}>
      <div style={{background:'#0f1318',border:`2px solid rgba(245,200,66,.3)`,borderRadius:20,padding:26,maxWidth:480,width:'100%',maxHeight:'90vh',overflowY:'auto',marginTop:'auto',marginBottom:'auto'}} onClick={e=>e.stopPropagation()}>
        <div style={{color:GOLD,fontSize:16,fontWeight:'bold',marginBottom:18}}>✏️ Edit Entry</div>

        <div style={{marginBottom:14}}>
          <label style={{display:'block',color:'rgba(255,255,255,.38)',fontSize:10,letterSpacing:3,textTransform:'uppercase',marginBottom:7}}>Type</label>
          <div style={{display:'flex',gap:8}}>
            {['bought','sold'].map(type=>{
              const active=f.type===type; const ac=type==='bought'?GREEN:RED; const rgb=type==='bought'?'61,220,132':'255,107,107';
              return <button key={type} onClick={()=>setF(p=>({...p,type}))} style={{flex:1,padding:'11px 0',border:`2px solid ${active?ac:'rgba(255,255,255,.1)'}`,borderRadius:12,cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:'bold',background:active?`rgba(${rgb},.13)`:'transparent',color:active?ac:'rgba(255,255,255,.28)'}}>{type==='bought'?'🟢 BOUGHT':'🔴 SOLD'}</button>;
            })}
          </div>
        </div>

        {[['Party Name','text',{value:f.partyName,onChange:e=>setF(p=>({...p,partyName:e.target.value}))}],
          ['Date','date',{value:f.date,onChange:e=>setF(p=>({...p,date:e.target.value}))}]
        ].map(([lbl,type,props])=>(
          <div key={lbl} style={{marginBottom:14}}>
            <label style={{display:'block',color:'rgba(255,255,255,.38)',fontSize:10,letterSpacing:3,textTransform:'uppercase',marginBottom:7}}>{lbl}</label>
            <input style={IS} type={type} {...props}/>
          </div>
        ))}

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:14}}>
          {[['Weight (g)','weight'],['Rate (₹/g)','rate'],['Amount (₹)','amount']].map(([lbl,key])=>(
            <div key={key}>
              <label style={{display:'block',color:'rgba(255,255,255,.38)',fontSize:10,letterSpacing:3,textTransform:'uppercase',marginBottom:7}}>{lbl}</label>
              <input style={IS} type="number" step="any" value={f[key]} onChange={e=>setF(p=>({...p,[key]:e.target.value}))} onBlur={calcOnBlur(key)}/>
            </div>
          ))}
        </div>

        <div style={{marginBottom:18}}>
          <label style={{display:'block',color:'rgba(255,255,255,.38)',fontSize:10,letterSpacing:3,textTransform:'uppercase',marginBottom:7}}>Note (optional)</label>
          <textarea rows={2} style={{...IS,resize:'vertical',minHeight:60,lineHeight:1.55}} value={f.narration} onChange={e=>setF(p=>({...p,narration:e.target.value}))}/>
        </div>

        {err&&<div style={{color:RED,fontSize:12,marginBottom:12}}>⚠️ {err}</div>}

        <div style={{display:'flex',gap:10}}>
          <button onClick={onClose} style={{flex:1,background:'rgba(255,255,255,.06)',border:`1px solid ${BORDER}`,borderRadius:12,padding:'13px',color:'rgba(255,255,255,.6)',fontSize:14,fontFamily:'inherit',cursor:'pointer'}}>Cancel</button>
          <button onClick={handle} style={{flex:2,background:`linear-gradient(135deg,${GOLD},#c08c08)`,border:'none',borderRadius:12,padding:'13px',color:'#000',fontSize:14,fontWeight:'bold',fontFamily:'inherit',cursor:'pointer'}}>💾 Save Changes</button>
        </div>
      </div>
    </div>
  );
}

          <div style={{color:GOLD,fontWeight:'bold',fontSize:15}}>📅 {fmtDate(date)}</div>
          <div style={{color:'rgba(255,255,255,.35)',fontSize:11,marginTop:2}}>{dayEntries.length} {dayEntries.length===1?'entry':'entries'}</div>

/* ─── ADD FORM ─── */
function AddForm({form, setForm, onAdd, syncCfg, syncing, lastSync, syncStatus, onSyncSetup}){
  const isB = form.type==='bought';

  /* smart auto-calculate: update value on change, calculate 3rd field on blur */
  const handleWeight = e => setForm(f => ({...f, weight: e.target.value}));
  const handleRate   = e => setForm(f => ({...f, rate:   e.target.value}));
  const handleAmount = e => setForm(f => ({...f, amount: e.target.value}));

  const calcOnBlur = field => () => {
    setForm(f => {
      const w = f.weight, r = f.rate, a = f.amount;
      if(field==='weight') {
        if(w && r)   return {...f, amount:String(Math.round(+w * +r))};
        if(w && a)   return {...f, rate:String((+a / +w).toFixed(2))};
      }
      if(field==='rate') {
        if(r && w)   return {...f, amount:String(Math.round(+w * +r))};
        if(r && a)   return {...f, weight:String((+a / +r).toFixed(2))};
      }
      if(field==='amount') {
        if(a && w)   return {...f, rate:String((+a / +w).toFixed(2))};
        if(a && r)   return {...f, weight:String((+a / +r).toFixed(2))};
      }
      return f;
    });
  };

  const displayAmount = form.amount ? +form.amount : 0;
  const pillCol = syncStatus==='ok'?GREEN : syncStatus==='error'||syncStatus==='expired'?RED : GOLD;
  const pillLabel = syncing?'Syncing…' : syncStatus==='ok'?`Auto ✓ ${lastSync}` : syncStatus==='expired'?'Expired' : syncStatus==='error'?'Sync Error' : 'Auto-sync On';

  return (
    <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:22,padding:24}}>
      <div style={{display:'flex',alignItems:'center',flexWrap:'wrap',gap:6,marginBottom:20}}>
        <div style={{color:GOLD,fontSize:16,fontWeight:'bold'}}>New Trade Entry</div>
        {syncCfg?.apiKey && <span className="sync-pill" style={{borderColor:pillCol,color:pillCol}}>☁️ {pillLabel}</span>}
      </div>

      <Field label="Type">
        <div style={{display:'flex',gap:8}}>
          {['bought','sold'].map(type => {
            const active = form.type===type;
            const ac = type==='bought'?GREEN:RED;
            const rgb = type==='bought'?'61,220,132':'255,107,107';
            return (
              <button key={type} onClick={()=>setForm(f=>({...f,type}))}
                style={{flex:1,padding:'13px 0',border:`2px solid ${active?ac:'rgba(255,255,255,.1)'}`,borderRadius:12,cursor:'pointer',fontFamily:'inherit',fontSize:14,fontWeight:'bold',background:active?`rgba(${rgb},.13)`:'transparent',color:active?ac:'rgba(255,255,255,.28)',transition:'all .2s'}}>
                {type==='bought'?'🟢 BOUGHT':'🔴 SOLD'}
              </button>
            );
          })}
        </div>
      </Field>

      <Field label="Party Name">
        <input style={IS} type="text" placeholder="e.g. Rakhul"
          value={form.partyName} onChange={e=>setForm(f=>({...f,partyName:e.target.value}))}/>
      </Field>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
        <Field label="Weight (g)">
          <input style={IS} type="number" step="any" placeholder="e.g. 5000"
            value={form.weight} onChange={handleWeight} onBlur={calcOnBlur('weight')}/>
        </Field>
        <Field label="Rate (₹/g)">
          <input style={IS} type="number" step="any" placeholder="e.g. 6500"
            value={form.rate} onChange={handleRate} onBlur={calcOnBlur('rate')}/>
        </Field>
        <Field label="Amount (₹)">
          <input style={IS} type="number" step="any" placeholder="e.g. 32500"
            value={form.amount} onChange={handleAmount} onBlur={calcOnBlur('amount')}/>
        </Field>
      </div>

      <Field label="Date">
        <input style={IS} type="date" value={form.date}
          onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
      </Field>

      <Field label="📝 Narration / Note (optional)">
        <textarea rows={3} placeholder="e.g. Advance paid ₹50,000 · Quality A-grade..."
          value={form.narration} onChange={e=>setForm(f=>({...f,narration:e.target.value}))}
          style={{...IS,resize:'vertical',minHeight:76,lineHeight:1.55}}/>
      </Field>

      <div style={{background:displayAmount>0?(isB?'rgba(61,220,132,.09)':'rgba(255,107,107,.09)'):'rgba(255,255,255,.03)',border:`1px solid ${displayAmount>0?(isB?'rgba(61,220,132,.28)':'rgba(255,107,107,.28)'):'rgba(255,255,255,.07)'}`,borderRadius:14,padding:'14px 18px',marginBottom:18,display:'flex',justifyContent:'space-between',alignItems:'center'}}>

          <div style={{color:'rgba(255,255,255,.32)',fontSize:10,letterSpacing:2,textTransform:'uppercase'}}>
            {form.weight&&form.rate ? `${fmtINR(form.weight)}g × ₹${fmtINR(form.rate)}` : 'Amount Preview'}

          <div style={{color:displayAmount>0?(isB?GREEN:RED):'rgba(255,255,255,.18)',fontSize:24,fontWeight:'bold',marginTop:3}}>
            ₹{fmtINR(Math.round(displayAmount))}

        </div>
        <div style={{fontSize:30}}>{displayAmount>0?(isB?'🟢':'🔴'):'💰'}</div>
      </div>

      <button onClick={onAdd} style={{width:'100%',background:`linear-gradient(135deg,${GOLD},#c08c08)`,border:'none',borderRadius:13,padding:'15px',color:'#000',fontSize:15,fontWeight:'bold',fontFamily:'inherit',cursor:'pointer',marginBottom:12}}>

          {syncing ? <span style={{color:GOLD}}>⏳ Syncing…</span>

            : syncStatus==='error' ? <span style={{color:RED}}>⚠️ Sync error</span>
            : <span>☁️ Auto-sync ON</span>
          }
        </span>
        <button onClick={onSyncSetup} style={{background:'none',border:'none',color:'rgba(255,255,255,.3)',fontSize:11,cursor:'pointer',fontFamily:'inherit'}}>⚙️ settings</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   MAIN APP
═══════════════════════════════════════ */
function App(){
  const [form, setForm]           = useState({...INIT, date:todayISO()});
  const [entries, setEntries]     = useState([]);
  const [archive, setArchive]     = useState([]);
  const [tab, setTab]             = useState('daywise');
  const [toast, setToast]         = useState('');
  const [expandedDay, setExpandedDay] = useState(null);
  const [editEntry, setEditEntry]     = useState(null);
  const [showDisclaimer, setShowDisclaimer] = useState(()=>!lsLoad(LS_DISCLAIMER,false));
  const [syncCfg, setSyncCfg]     = useState(()=>lsLoad(LS_SYNC,null));
  const [showSyncModal, setShowSyncModal] = useState(false);
  const [syncing, setSyncing]     = useState(false);
  const [syncStatus, setSyncStatus] = useState('');
  const [lastSync, setLastSync]   = useState('');

  const showToast = useCallback(msg => { setToast(msg); setTimeout(()=>setToast(''), 3000); }, []);

  const lastDateRef = React.useRef(todayISO());

  /* ── midnight reset: archive today's entries and clear P&L ── */
  useEffect(()=>{
    const checkReset = () => {
      const today = todayISO();
      const lastDate = lastDateRef.current;
      if(lastDate !== today) {
        setEntries(prev => {
          if(prev.length > 0) {
            setArchive(arc => {
              const map = {};
              prev.forEach(e => { (map[e.date]=map[e.date]||[]).push(e); });
              const newDays = Object.keys(map).map(d => ({date:d, entries:map[d]}));
              const arcMap = {};
              arc.forEach(d => { arcMap[d.date] = d; });
              newDays.forEach(d => {
                if(arcMap[d.date]) arcMap[d.date].entries = [...arcMap[d.date].entries, ...d.entries];
                else arcMap[d.date] = d;
              });
              return Object.values(arcMap);
            });
          }
          return [];
        });
        lastDateRef.current = today;
      }
    };
    checkReset();
    // check every minute
    const interval = setInterval(checkReset, 60000);
    return () => clearInterval(interval);
  }, []);

  /* ── sync ── */
  const doSync = useCallback(async (push, silent=false) => {
    if(!syncCfg?.apiKey || !syncCfg?.passphrase){ if(!silent) showToast('⚙️ Set up sync first'); return; }
    setSyncing(true);
    try {
      if(push){
        await cloudPush(syncCfg.apiKey, syncCfg.passphrase, syncCfg.salt, entries);
        setSyncStatus('ok');
        setLastSync(new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}));
        if(!silent) showToast('☁️ Pushed!');
      } else {
        const data = await cloudPull(syncCfg.apiKey, syncCfg.passphrase, syncCfg.salt);
        if(data?.entries) setEntries(data.entries);
        setSyncStatus('ok');
        setLastSync(new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}));
        if(!silent) showToast('☁️ Pulled!');
      }
    } catch(err){
      if(!silent){
        setSyncStatus('error');
        if(err.message==='EXPIRED')  showToast('⏰ Cloud data expired (7 days).');
        else if(err.message==='NOBASKET') showToast('📭 No cloud data yet — add an entry first.');
        else showToast('❌ '+err.message);
      }
    } finally { setSyncing(false); }
  }, [syncCfg, entries, showToast]);

  /* auto pull on open */
  useEffect(()=>{
    if(syncCfg?.apiKey && syncCfg?.passphrase) doSync(false, true);
  // eslint-disable-next-line
  },[]);

  /* live sync — pull from cloud every 30s */
  useEffect(()=>{
    if(!syncCfg?.apiKey || !syncCfg?.passphrase) return;
    const interval = setInterval(()=>doSync(false, true), 30000);
    return ()=>clearInterval(interval);
  }, [syncCfg, doSync]);

  /* auto push 3s after entries change */
  useEffect(()=>{
    if(!syncCfg?.apiKey || !syncCfg?.passphrase) return;
    const t = setTimeout(()=>doSync(true, true), 3000);
    return ()=>clearTimeout(t);
  }, [entries, syncCfg]);

  /* ── handlers ── */
  const handleAdd = useCallback(()=>{
    const filled = [form.weight, form.rate, form.amount].filter(v=>v&&+v>0).length;
    if(!form.partyName || filled < 2){ showToast('⚠️ Fill Party Name + any 2 of Weight/Rate/Amount'); return; }
    if(!form.date){ showToast('⚠️ Pick a date'); return; }
    const w = +form.weight || 0;
    const r = +form.rate   || 0;
    const a = +form.amount || Math.round(w*r);
    setEntries(prev=>[{...form, weight:w, rate:r, amount:a, id:Date.now()}, ...prev]);
    setForm(f=>({...INIT, date:f.date, type:f.type}));
    showToast('✅ Entry saved!');
  }, [form, showToast]);

  const handleDelete = useCallback(id=>{
    if(!window.confirm('Delete this entry?')) return;
    setEntries(prev=>prev.filter(e=>e.id!==id));
    showToast('🗑️ Deleted');
  }, [showToast]);

  const handleEdit = useCallback(entry=>{ setEditEntry(entry); }, []);

  const handleSaveEdit = useCallback(updated=>{
    setEntries(prev=>prev.map(e=>e.id===updated.id?updated:e));
    setEditEntry(null);
    showToast('✅ Entry updated!');
  }, [showToast]);

  const doShare = useCallback(async (text, title)=>{
    if(navigator.share){ try{ await navigator.share({title,text}); showToast('📤 Shared!'); return; }catch(e){} }
    try{ await navigator.clipboard.writeText(text); showToast('📋 Copied!'); }catch(e){ showToast('Copy failed'); }
  }, [showToast]);

  const shareEntry = useCallback(e => doShare(
    `📋 Trade — ${e.type.toUpperCase()}\n👤 ${e.partyName}\n⚖️ ${fmtINR(e.weight)} g\n💰 ₹${fmtINR(e.rate)}/g\n💵 ₹${fmtINR(e.amount)}\n📅 ${fmtDate(e.date)}${e.narration?'\n📝 '+e.narration:''}`,
    'Trade - '+e.partyName
  ), [doShare]);

  const shareDay = useCallback((date, de)=>{
    const b=de.filter(e=>e.type==='bought'), s=de.filter(e=>e.type==='sold');
    const sec=(lbl,list)=>!list.length?'':
      `${lbl}\n${list.map(e=>`  • ${e.partyName}: ${fmtINR(e.weight)}g @ ₹${fmtINR(e.rate)} = ₹${fmtINR(e.amount)}${e.narration?' ['+e.narration+']':''}`).join('\n')}\n  Total: ${fmtINR(sumW(list))}g | Avg ₹${fmtINR(avgR(list))} | ₹${fmtINR(sumA(list))}`;
    doShare([`📅 ${fmtDate(date)}`, sec('🟢 BOUGHT',b), sec('🔴 SOLD',s)].filter(Boolean).join('\n\n'), 'Day Report');
  }, [doShare]);

  const handleClearAll = useCallback(async ()=>{
    if(!window.confirm('⚠️ Delete ALL entries from cloud?\n\nThis cannot be undone.')) return;
    setSyncing(true);
    try{
      if(syncCfg?.apiKey) await cloudDeleteBasket(syncCfg.apiKey);
      setEntries([]);
      setSyncStatus(''); setLastSync('');
      showToast('✅ All data deleted');
    }catch(err){ showToast('❌ Delete failed: '+err.message); }
    finally{ setSyncing(false); }
  }, [syncCfg, showToast]);

  const saveSyncCfg = useCallback(cfg=>{
    setSyncCfg(cfg); lsSave(LS_SYNC,cfg); setShowSyncModal(false); showToast('✅ Sync saved!');
  }, [showToast]);

  /* ── derived data ── */
  const daywise = useMemo(()=>{
    const map = {};
    entries.forEach(e=>{ (map[e.date]=map[e.date]||[]).push(e); });
    return Object.keys(map).sort((a,b)=>b.localeCompare(a)).map(date=>({date,entries:map[date]}));
  }, [entries]);

  const summary = useMemo(()=>{
    const b = entries.filter(e=>e.type==='bought');
    const s = entries.filter(e=>e.type==='sold');
    const bW=sumW(b), sW=sumW(s), bA=sumA(b), sA=sumA(s);
    return {
      bought:{ count:b.length, weight:bW, amount:bA, avgRate:avgR(b), avgWeight:b.length?Math.round(bW/b.length):0, avgAmount:b.length?Math.round(bA/b.length):0 },
      sold:{   count:s.length, weight:sW, amount:sA, avgRate:avgR(s), avgWeight:s.length?Math.round(sW/s.length):0, avgAmount:s.length?Math.round(sA/s.length):0 },
      pnl: bA-sA,
      netW: bW-sW,
      netAvgRate: bW?Math.round(bA/bW):0,
      netAvgAmount: (bW-sW)>0 ? (bW-sW)*(bW?Math.round(bA/bW):0) : 0,
    };
  }, [entries]);

  const DayList = () => daywise.length===0
    ? <div style={{textAlign:'center',padding:'60px 20px',color:'rgba(255,255,255,.25)'}}><div style={{fontSize:48,marginBottom:12}}>📭</div><div>No entries yet</div></div>
    : daywise.map(({date,entries:de})=>(
        <DayCard key={date} date={date} dayEntries={de}
          expandedDay={expandedDay} setExpandedDay={setExpandedDay}
          onShare={shareEntry} onDelete={handleDelete} onEdit={handleEdit} onShareDay={shareDay}/>
      ));

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <div className="glow"/>

      {showDisclaimer && (
        <DisclaimerModal onAccept={pw=>{
          const salt = bytesToHex(crypto.getRandomValues(new Uint8Array(16)));
          const cfg = {apiKey:DEFAULT_PANTRY_ID, binId:'', passphrase:pw, salt};
          setSyncCfg(cfg); lsSave(LS_SYNC,cfg);
          lsSave(LS_DISCLAIMER,true); setShowDisclaimer(false);
        }}/>
      )}
      {showSyncModal && <SyncModal syncCfg={syncCfg} onSave={saveSyncCfg} onClose={()=>setShowSyncModal(false)}/>}
      {editEntry && <EditModal entry={editEntry} onSave={handleSaveEdit} onClose={()=>setEditEntry(null)}/>}

      <header style={{position:'sticky',top:0,zIndex:20,background:'rgba(8,11,16,.93)',backdropFilter:'blur(18px)',borderBottom:'1px solid rgba(245,200,66,.12)',padding:'12px 22px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
        <div>
          <div style={{fontSize:9,letterSpacing:5,color:GOLD,textTransform:'uppercase',marginBottom:1}}>Gold Trade</div>
          <div style={{fontSize:20,fontWeight:'bold'}}>📒 Ledger Book</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{color:'rgba(255,255,255,.25)',fontSize:11}}>{new Date().toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short',year:'numeric'})}</div>
          {entries.length>0 && <div style={{color:'rgba(61,220,132,.55)',fontSize:10,marginTop:2}}>☁️ {entries.length} entries</div>}
        </div>
      </header>

      {/* Desktop */}
      <div className="desktop-layout" style={{flex:1,maxWidth:1200,margin:'0 auto',width:'100%',padding:'22px 24px 40px',gap:24,alignItems:'flex-start',position:'relative',zIndex:1}}>
        <div style={{flex:'0 0 420px',minWidth:0,position:'sticky',top:70,maxHeight:'calc(100vh - 80px)',overflowY:'auto'}}>
          <AddForm form={form} setForm={setForm} onAdd={handleAdd}
            syncCfg={syncCfg} syncing={syncing} lastSync={lastSync} syncStatus={syncStatus}
            onSyncSetup={()=>setShowSyncModal(true)}/>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',gap:4,background:'rgba(255,255,255,.04)',borderRadius:12,padding:4,marginBottom:16}}>
            {[{key:'daywise',label:`📅 Day-wise (${daywise.length})`},{key:'summary',label:'📊 Summary'},{key:'archive',label:`🗄️ Archive (${archive.length})`}].map(t=>(
              <button key={t.key} onClick={()=>setTab(t.key)}
                style={{flex:1,padding:'9px 6px',border:'none',borderRadius:9,cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:'bold',transition:'all .2s',background:tab===t.key?`linear-gradient(135deg,${GOLD},#c08c08)`:'transparent',color:tab===t.key?'#000':'rgba(255,255,255,.4)'}}>
                {t.label}
              </button>
            ))}
          </div>
          {tab==='daywise' && <DayList/>}
          {tab==='summary' && <SummaryPanel summary={summary} entries={entries} daywise={daywise} onClearAll={handleClearAll} syncing={syncing}/>}
          {tab==='archive' && <ArchivePanel archive={archive}/>}
        </div>
      </div>

      {/* Mobile */}
      <div className="mobile-layout">
        {tab==='add'     && <AddForm form={form} setForm={setForm} onAdd={handleAdd} syncCfg={syncCfg} syncing={syncing} lastSync={lastSync} syncStatus={syncStatus} onSyncSetup={()=>setShowSyncModal(true)}/>}
        {tab==='daywise' && <DayList/>}
        {tab==='summary' && <SummaryPanel summary={summary} entries={entries} daywise={daywise} onClearAll={handleClearAll} syncing={syncing}/>}
        {tab==='archive' && <ArchivePanel archive={archive}/>}
      </div>
      <div className="mobile-nav">
        {[{key:'add',em:'➕',label:'Add'},{key:'daywise',em:'📅',label:`Days(${daywise.length})`},{key:'summary',em:'📊',label:'Summary'},{key:'archive',em:'🗄️',label:`Archive`}].map(t=>(
          <button key={t.key} onClick={()=>setTab(t.key)}
            style={{flex:1,padding:'10px 4px 14px',border:'none',background:'transparent',cursor:'pointer',fontFamily:'inherit',borderTop:`2px solid ${tab===t.key?GOLD:'transparent'}`}}>
            <div style={{fontSize:20}}>{t.em}</div>
            <div style={{color:tab===t.key?GOLD:'rgba(255,255,255,.32)',fontSize:10,marginTop:2}}>{t.label}</div>
          </button>
        ))}
      </div>

      <div style={{borderTop:`1px solid ${BORDER}`,padding:'12px 24px',textAlign:'center',color:'rgba(255,255,255,.2)',fontSize:10,lineHeight:1.8,background:'rgba(8,11,16,.8)'}}>
        ⚖️ For <strong style={{color:'rgba(255,255,255,.35)'}}>educational and personal record-keeping use only</strong>. Not financial or legal advice. Developer accepts no liability. End-to-end encrypted; server stores only ciphertext. Cloud data auto-deletes after 7 days.
      </div>

      {toast && (
        <div style={{position:'fixed',bottom:80,left:'50%',transform:'translateX(-50%)',background:'rgba(8,11,16,.97)',border:'1px solid rgba(245,200,66,.35)',color:'#fff',padding:'11px 22px',borderRadius:12,fontSize:13,fontWeight:'bold',zIndex:500,backdropFilter:'blur(20px)',whiteSpace:'nowrap',maxWidth:'90vw',textAlign:'center'}}>
          {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
